<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In</title>
    <link rel="stylesheet" href="page1.css" />
  </head>
  <body>
    <div class="card">
      <nav>
        <div class="menu-icon"><span></span><span></span><span></span></div>
        <div class="search">
          <input type="text" placeholder="Search..." />
          <svg
            width="15"
            height="15"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2.2"
          ></svg>
        </div>
      </nav>

      <!-- Blurred background -->
      <div class="bg-content">
        <main>
          <h1>Report An Issue</h1>
          <button class="btn" style="opacity: 0.5; pointer-events: none">
            Log in to my account
          </button>
          <label>Email <span class="required">*</span></label>
          <input type="email" placeholder="you@address.co.nz" disabled />
          <label class="remember"
            ><input type="checkbox" disabled /> Remember me</label
          >
          <button
            class="btn btn-next"
            style="opacity: 0.5; pointer-events: none"
          >
            Next
          </button>
          <div class="signup">
            <p>Don't have an account ?</p>
            <a href="#"
              ><span class="avatar"
                ><svg
                  width="11"
                  height="11"
                  fill="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    d="M12 12a5 5 0 100-10 5 5 0 000 10zm0 2c-5.33 0-8 2.67-8 4v1h16v-1c0-1.33-2.67-4-8-4z"
                  /></svg
              ></span>
              Create new account</a
            >
          </div>
        </main>
        <footer>
          <h2>Need Help?</h2>
          <p>Get in touch with us</p>
          <a class="contact" href="#"
            ><svg
              width="14"
              height="14"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <rect x="3" y="5" width="18" height="14" rx="2" />
              <polyline points="3,5 12,13 21,5" />
            </svg>
            Contact us</a
          >
        </footer>
      </div>

      <!-- Sign in modal -->
      <div class="modal-overlay">
        <div class="modal">
          <h2>Sign in to your account</h2>

          <label for="email">Email <span class="required">*</span></label>
          <input
            type="email"
            id="email"
            placeholder="you@address.co.nz"
            oninput="clearError('email-error', this)"
          />
          <p class="error-msg" id="email-error">
            please enter a valid email address
          </p>

          <label for="password">Password <span class="required">*</span></label>
          <div class="password-wrap">
            <input
              type="password"
              id="password"
              placeholder="Z1234567"
              oninput="clearError('pw-error', this)"
            />
            <button class="toggle-pw" onclick="togglePassword()" type="button">
              <svg
                id="eye-icon"
                width="18"
                height="18"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"
                />
                <path
                  d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"
                />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
            </button>
          </div>
          <p class="error-msg" id="pw-error">
            *Password must be at least 8 characters
          </p>

          <button class="btn-signin" onclick="handleSignIn()">SIGN IN</button>
          <a href="#" class="forgot">Forgot password?</a>
        </div>
      </div>
    </div>

    <script>
      function togglePassword() {
        const input = document.getElementById("password");
        const icon = document.getElementById("eye-icon");
        if (input.type === "password") {
          input.type = "text";
          icon.innerHTML = `<path d="M1 12S5 4 12 4s11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/>`;
        } else {
          input.type = "password";
          icon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;
        }
      }

      function clearError(id, input) {
        document.getElementById(id).style.display = "none";
        input.style.borderColor = "#c8d0e8";
      }

      function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      }

      function handleSignIn() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const hasLength = password.length >= 8;
        const hasUpper = /[A-Z]/.test(password);
        let valid = true;

        if (!isValidEmail(email)) {
          document.getElementById("email-error").style.display = "block";
          document.getElementById("email").style.borderColor = "#d94040";
          valid = false;
        }

        if (!hasLength || !hasUpper) {
          document.getElementById("pw-error").style.display = "block";
          document.getElementById("password").style.borderColor = "#d94040";
          valid = false;
        }

        if (valid) {
          window.location.href = "page3.html";
        }
      }
    </script>
  </body>
</html>
