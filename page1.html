<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In</title>
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <div class="card">
      <nav>
        <div class="menu-icon"><span></span><span></span><span></span></div>
        <div class="search">
          <input type="text" placeholder="Search..." />
          <svg
            width="15"
            height="15"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2.2"
          >
            <circle cx="11" cy="11" r="7" />
            <line x1="16.5" y1="16.5" x2="22" y2="22" />
          </svg>
        </div>
      </nav>

      <main>
        <h1>Sign in to your account</h1>

        <label for="email">Email <span class="required">*</span></label>
        <input type="email" id="email" placeholder="you@address.co.nz" />

        <label for="password">Password <span class="required">*</span></label>
        <div class="password-wrap">
          <input
            type="password"
            id="password"
            placeholder="Z1234567"
            oninput="validatePassword()"
          />
          <button class="toggle-pw" onclick="togglePassword()" type="button">
            <svg
              id="eye-icon"
              width="18"
              height="18"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"
              />
              <path
                d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"
              />
              <line x1="1" y1="1" x2="23" y2="23" />
            </svg>
          </button>
        </div>

        <ul class="pw-rules" id="pw-rules">
          <li id="rule-length">At least 8 characters</li>
          <li id="rule-upper">At least 1 uppercase letter</li>
        </ul>
        <p class="pw-hint" id="pw-hint">
          *Password must be at least 8 characters
        </p>

        <button class="btn-signin" onclick="handleSignIn()">SIGN IN</button>
        <a href="#" class="forgot">Forgot password?</a>
        <a href="page1.html" class="back-link">← Back</a>
      </main>

      <footer>
        <h2>Need Help?</h2>
        <p>Get in touch with us</p>
        <a class="contact" href="#">
          <svg
            width="14"
            height="14"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="3" y="5" width="18" height="14" rx="2" />
            <polyline points="3,5 12,13 21,5" />
          </svg>
          Contact us
        </a>
      </footer>
    </div>

    <script>
      function togglePassword() {
        const input = document.getElementById("password");
        const icon = document.getElementById("eye-icon");
        if (input.type === "password") {
          input.type = "text";
          icon.innerHTML = `<path d="M1 12S5 4 12 4s11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/>`;
        } else {
          input.type = "password";
          icon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;
        }
      }

      function validatePassword() {
        const val = document.getElementById("password").value;
        const hasLength = val.length >= 8;
        const hasUpper = /[A-Z]/.test(val);
        const rules = document.getElementById("pw-rules");
        const hint = document.getElementById("pw-hint");

        rules.style.display = val.length > 0 ? "block" : "none";
        hint.style.display = "none";

        document.getElementById("rule-length").className = hasLength
          ? "valid"
          : "invalid";
        document.getElementById("rule-upper").className = hasUpper
          ? "valid"
          : "invalid";
      }

      function handleSignIn() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const hasLength = password.length >= 8;
        const hasUpper = /[A-Z]/.test(password);

        if (!email) {
          alert("Please enter your email.");
          return;
        }
        if (!hasLength || !hasUpper) {
          document.getElementById("pw-rules").style.display = "block";
          document.getElementById("pw-hint").style.display = "block";
          validatePassword();
          return;
        }
        alert("Signed in successfully!");
      }
    </script>
  </body>
</html>
