<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report History</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
               <link rel="stylesheet" href="global.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <!-- !Header -->
    <header class="header">
      <nav class="navbar navbar-expand-md fixed-top">
        <div class="container">

          <!-- navbar 🍔 menu button -->
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#mainNavbar"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <!-- 🍔 menu contents, collapse -->
          <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto d-flex">
              <li class="nav-item active">
                <a class="nav-link text-primary" href="#">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-primary" href="#">Features</a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-primary" href="#">Contact</a>
              </li>
            </ul>
          </div>

          <!-- A-Z button -->
<button class=" btn btn-outline-primary btn-sm">A-Z</button>

<!-- Search Icon -->
<i class="bi bi-search text-primary fs-1"></i>
        </div>
      </nav>
    </header>

    <!-- !Report History -->
    <main class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="p-4 w-100" style="max-width: 500px">
                    <section class="myReportHistory">
                      <h1 class="text-primary text-center">My Report History</h1>
                <br>
                      <label class="form-label"><strong>Issue Type:</strong></label>
                <p>Graffiti, Illegal Dumping</p>
    
                <label class="form-label"><strong>Location:</strong></label>
                <p>123 Max Street, Britomart, Auckland 1234</p>

                <label class="form-label"><strong>Extra Details:</strong></label>
                <p>Near the bus stop on Queen Street</p>

                <label class="form-label"><strong>Photos:</strong></label>
                <div class="photos row g-3">
                     <div class="col-md-6">
                          <img src="photos/photo1.jpg" alt="Photo Graffiti 1" class="img-fluid">
                     </div>
<br>
                     <div class="col-md-6"> 
                          <img src="photos/photo2.jpeg" alt="Photo Graffiti 2" class="img-fluid">
                     </div>

                     <div class="col-md-6"> <img src="photos/photo3.jpg" alt="Photo Graffiti 3" class="img-fluid"></div>
                </div>

                <br>
                <label class="form-label"><strong>Status:</strong></label>
                <p>Pending Review...</p>

           </section>
        </div>
    </main>

<!-- !BUTTONS -->
 <button class="btn btn-primary"> Add comment </button>
 <br>
 <button class="btn btn-primary">Home</button>
<br>
        <!-- !FOOTER -->
    <footer class="footer text-white pt-5 pb-2">
      <div class="container text-md-start text-center">
        <div class="row">

          <div class="col-md-4 mb-4">
            <h5>Need Help?</h5>
            <p>Get in touch with us if you need assistance.</p>
            <!-- Contact us button -->
            <a href="" class=" btn btn-outline-light text-white text-decoration-none">
              <i class="bi bi-envelope"></i> Contact us
            </a>
          </div>



        </div>
        <!-- divider -->
        <hr class="mb-3" style="opacity: 0.2" />
        <!-- !COPYRIGHT -->
        &copy; 2026 Fix It. All rights reserved.
      </div>
    </footer>
</body>
</html>
