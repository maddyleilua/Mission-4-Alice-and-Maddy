<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report History</title>
           <link rel="stylesheet" href="global.css">
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <!-- !Header -->
     <header class="header" id="header">
<nav class="navbar navbar-expand-md navbar-light bg-light fixed-top">
      <div class="container">
        <a class="navbar-brand text-primary" href="#">Fix It!</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNavbar"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
          <ul class="navbar-nav ms-auto d-flex ">
            <li class="nav-item active">
              <a class="nav-link text-primary" href="#">Home</a>
            </li>
            <li class="nav-item"><a class="nav-link text-primary" href="#">Features</a></li>
            <li class="nav-item"><a class="nav-link  text-primary" href="#">Contact</a></li>
          </ul>
        </div>

        <!-- !Search bar -->
        <search class="collapse navbar-collapse" id="searchNavbar">
          <form class="d-flex">
            <input
              class="form-control me-2"
              type="search"
              placeholder="Search"
              aria-label="Search"
            />
            <button class="btn btn-outline-primary" type="submit">
              <i class="bi bi-search"></i>
            </button>
          </form>
        </search>
      </div>
    </nav>
    </header>

    <!-- !Report History -->
    <section class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="card shadow p-4 w-100" style="max-width: 500px">
                    <section>
                <h5><strong>Issue Type:</strong></h5>
                <p>Graffiti, Illegal Dumping</p>
    
                <h5><strong>Location:</strong></h5>
                <p>123 Max Street, Britomart, Auckland 1234</p>

                <h6><strong>Extra Details:</strong></h6>
                <p>Near the bus stop on Queen Street</p>

                <h5><strong>Photos:</strong></h5>
                <div class="row">
                     <div class="col-md-6">
                          <img src="photos/photo1.jpg" alt="Photo Graffiti 1" class="img-fluid">
                     </div>
<br>
                     <div class="col-md-6"> 
                          <img src="photos/photo2.jpeg" alt="Photo Graffiti 2" class="img-fluid">
                     </div>

                     <div class="col-md-6"> <img src="photos/photo3.jpg" alt="Photo Graffiti 3" class="img-fluid"></div>
                </div>

                <h5><strong>Status:</strong></h5>
                <p>Pending Review</p>

           </section>
        </div>
    </section>
</body>
</html>
