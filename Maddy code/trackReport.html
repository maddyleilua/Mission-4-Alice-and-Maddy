<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"

    <link

  <body>
        <!-- !Header -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand" href="#">Fix it!</a>
      </div>
    </nav>

  <!-- !Track Report -->
    <section>
      <div
        class="container d-flex justify-content-center align-items-center min-vh-100"
      >
        <div class="card shadow p-4 w-100" style="max-width: 500px">
          <h1>Track Your Report</h1>
          <p>Enter your Reference ID to track its status.</p>
          <!-- !Tracking Form -->
          <form action="">
            <div class="mb-3">
              <label for="reportId" class="form-label">Reference ID</label>
              <input
                type="text"
                class="form-control"
                id="reportId"
                placeholder="Enter your report ID"
                required
              />
            </div>
<a href="reportStatus.html" class="btn btn-primary mt-3">Track Report</a>

            <h6>Don't have your reference ID?</h6>
            <a href="">Contact support</a>
          </form>
        </div>
      </div>
    </section>
  </body>
