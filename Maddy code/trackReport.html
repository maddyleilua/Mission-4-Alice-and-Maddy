<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Track Report</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="global.css" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body>
    <!-- !Header -->
    <header class="header">
      <nav class="navbar navbar-expand-md fixed-top">
        <div class="container">
          <!-- navbar 🍔 menu button -->
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#mainNavbar"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <!-- 🍔 menu contents, collapse -->
          <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto d-flex">
              <li class="nav-item active">
                <a class="nav-link text-primary" href="#">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-primary" href="#">Features</a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-primary" href="#">Contact</a>
              </li>
            </ul>
          </div>

          <!-- div class keeps icons to the right side -->
          <div class="d-flex justify-content-end">
            <!-- A-Z button -->
            <button class="btn btn-outline-primary btn-sm" onclick="window.location.href = 'reportDatabase.html'">A - Z</button>

            <!-- Search Icon -->
            <i class="bi bi-search text-primary fs-1 p-1"></i>
          </div>
        </div>
      </nav>
    </header>

  <!-- !Track Report -->
    <section>
      <div
        class="container d-flex justify-content-center align-items-center min-vh-100"
      >
        <div class="card shadow p-4 w-100" style="max-width: 500px">
          <h1 class="text-primary">Track Your Report</h1>
          <p>Enter your Reference ID to track its status.</p>
          <!-- !Tracking Form -->
          <form action="">
            <div class="mb-3">
              <label for="reportId" class="form-label"><strong>Reference ID</strong></label>
              <input
                type="text"
                class="form-control"
                style="color: #1a2a6c"
                id="reportId"
                placeholder="Enter your report ID"
                required
              />
              <p class="hint text-secondary">E.g. Z123456</p>
            </div>

            <!-- button -->
            <button class="btn btn-primary mt-3" onclick="location.href='reportStatus.html'">Track Report</button>
            <br>
            <h6 class="text-center">Don't have your reference ID?</h6>
            <a href="" class="text-center">Contact support</a>
          </form>
        </div>
      </div>
    </section>


        <!-- !FOOTER -->
    <footer class="footer text-white pt-5 pb-2">
      <div class="container text-md-start text-center">
        <div class="row">

          <div class="col-md-4 mb-4">
            <h5>Need Help?</h5>
            <p>Get in touch with us if you need assistance.</p>
            <!-- Contact us button -->
            <a href="" class=" btn btn-outline-light text-white text-decoration-none">
              <i class="bi bi-envelope"></i> Contact us
            </a>
          </div>



        </div>
        <!-- divider -->
        <hr class="mb-3" style="opacity: 0.2" />
        <!-- !COPYRIGHT -->
        &copy; 2026 Fix It. All rights reserved.
      </div>
    </footer>
  </body>
</html>
