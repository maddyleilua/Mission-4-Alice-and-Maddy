<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Report</title>
        <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body>
    <section>
        <div class="container d-flex justify-content-center align-items-center min-vh-100">

      <div class="card shadow p-4 w-100" style="max-width: 500px">
            <h1>Track Your Report</h1>
            <p>Enter your Reference ID to track its status.</p>
            <!-- !Tracking Form -->
             <form action="">
                <div class="mb-3">
                    <label for="reportId" class="form-label">Reference ID</label>
                    <input type="text" class="form-control" id="reportId" placeholder="Enter your report ID" required>
                </div>
                <button type="submit" class="btn btn-primary">Track Report</button>
                
                <h6>Don't have your reference ID?</h6>
                <a href="">Contact support</a>
             </form>
        </div>
        </div>
    </section>
</body>
</html>
