<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Location</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="global.css" />
  </head>

  <body>
    <!-- !Header -->
    <header class="header">
      <nav class="navbar navbar-expand-md fixed-top">
        <div class="container">

          <!-- navbar 🍔 menu button -->
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#mainNavbar"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <!-- 🍔 menu contents, collapse -->
          <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto d-flex">
              <li class="nav-item active">
                <a class="nav-link text-primary" href="#">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-primary" href="#">Features</a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-primary" href="#">Contact</a>
              </li>
            </ul>
          </div>

          <!-- A-Z button -->
<button class=" btn btn-outline-primary btn-sm">A-Z</button>

<!-- Search Icon -->
<i class="bi bi-search text-primary fs-1"></i>
        </div>
      </nav>
    </header>

    <!-- !Report Location -->
    <div
      class="container d-flex justify-content-center align-items-center min-vh-100"
    >
      <div class="p-4 w-100" style="max-width: 500px">
        <h1 class="text-center text-primary">Illegal Dumping</h1>
        <p class="text-secondary">
          Please provide accurate information so our team can find the issue.
        </p>
        <div class="mb-3">
          <label for="address" class="form-label"
            ><strong>Where is the issue located?*</strong>
          </label>
          <input
            type="address"
            class="form-control"
            id="addressIssue"
            placeholder="123 Max Street, Britomart, Auckland 1234"
            required
          />

          <!-- !BUTTON -->
          <div class="mb-3">
            <button id="Find-me" class="btn btn-primary mt-3">
              Show my location
            </button>
            <p id="location"></p>

            <!-- !MAP -->
            <iframe
              id="map"
              src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d9343.80396806113!2d174.77039956534725!3d-36.848335930718676!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e1!3m2!1sen!2snz!4v1767826261837!5m2!1sen!2snz"
              width="300"
              height="300"
              style="border: 0"
              allowfullscreen=""
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
            ></iframe>

            <br />
            <br />

            <label for="address" class="form-label"
              >Please describe the location of the issue in more detail (e.g.
              nearby landmarks, cross streets, etc.)</label
            >
            <input
              type="addressDetails"
              class="form-control"
              id="addressDetails"
              placeholder="Big rubbish bin near the bus stop on Queen Street"
              required
            />

            <!-- buttons -->
             <br>
           <button class="btn btn-primary mt3" onclick="location.href='unwanted/reportIssue.html'">Back</button>
           <button class="btn btn-primary mt-3" onclick="location.href='reviewReport.html'">Continue</button>

            
          </div>
        </div>
      </div>
    </div>

    <!-- !FOOTER -->
    <footer class="footer text-white pt-5 pb-2">
      <div class="container text-md-start text-center">
        <div class="row">

          <div class="col-md-4 mb-4">
            <h5>Need Help?</h5>
            <p>Get in touch with us if you need assistance.</p>
            <!-- Contact us button -->
            <a href="" class=" btn btn-outline-light text-white text-decoration-none">
              <i class="bi bi-envelope"></i> Contact us
            </a>
          </div>



        </div>
        <!-- divider -->
        <hr class="mb-3" style="opacity: 0.2" />
        <!-- !COPYRIGHT -->
        &copy; 2026 Fix It. All rights reserved.
      </div>
    </footer>

    <!-- !JAVASCRIPT FOR LOCATION -->
    <script>
      const findMeButton = document.getElementById("Find-me");
      const locationText = document.getElementById("location");
      const map = document.getElementById("map");
      findMeButton.addEventListener("click", () => {
        locationText.innerHTML =
          "Finding your location...<div class='spinner-border'></div>";
        navigator.geolocation.getCurrentPosition(
          (position) => {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            const locationString = `https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d9343.80396806113!2d${lon}!3d${lat}!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e1!3m2!1sen!2snz!4v1767826261837!5m2!1sen!2snz`;

            locationText.textContent = `Latitude: ${lat}, Longitude: ${lon}`;
            map.src = locationString;
          },
          // error
          () => {
            locationText.textContent = "Unable to get your location";
          },
        );
      });
    </script>
  </body>
</html>
