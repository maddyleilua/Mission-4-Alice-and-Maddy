<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Message Sent</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="global.css" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>

  <body>
    <!-- Skip link for accessibility -->
    <a href="#main-content" aria-label="Skip to main content" class="skip-link"
      >Skip to main content</a
    >
    <!-- Stolen from Aadi -->

    <!-- !Header -->
    <header class="header">
      <nav
        class="navbar navbar-expand-md fixed-top"
        aria-label="Main navigation"
      >
        <div class="container">
          <!-- navbar 🍔 menu button -->
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#mainNavbar"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <!-- Added aria-label because hamburger button has no visible text -->
            <span class="navbar-toggler-icon"></span>
          </button>

          <!-- 🍔 menu contents, collapse -->
          <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto d-flex">
              <li class="nav-item active">
                <a
                  class="nav-link text-primary"
                  href="/Mission-4-Alice-and-Maddy/home.html"
                  >Home</a
                >
              </li>
              <li class="nav-item">
                <a
                  class="nav-link text-primary"
                  href="/Mission-4-Alice-and-Maddy/login.html"
                  >Login</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link text-primary" href="NeedHelp.html"
                  >Need Help?</a
                >
              </li>
            </ul>
          </div>

          <!-- div class keeps icons to the right side -->
          <div class="d-flex justify-content-end">
            <!-- A-Z button -->
            <button
              class="btn btn-outline-primary btn-sm"
              aria-label="View reports A to Z"
              onclick="window.location.href = 'reportDatabase.html'"
            >
              A - Z
            </button>

            <!-- Search Icon -->
            <i
              class="bi bi-search text-primary fs-1 p-1"
              role="img"
              aria-label="Search"
            ></i>
          </div>
        </div>
      </nav>
    </header>

    <main
      id="main-content"
      tabindex="-1"
      class="container d-flex justify-content-center align-items-center min-vh-100"
    >
      <div class="card shadow p-4 w-100" style="max-width: 500px">
        <h4 class="success">Message Sent</h4>
        <p>
          Your message has been sent successfully to council. We will get back
          to you as soon as possible.
        </p>

        <!-- !BUTTONS -->
        <button
          class="btn btn-primary mt-3"
          aria-label="Back to your report"
          onclick="window.location.href = 'myReportHistory.html'"
        >
          Back to Report
        </button>
        <button
          class="btn btn-primary mt-3"
          onclick="
            window.location.href = '/Mission-4-Alice-and-Maddy/home.html'
          "
        >
          Home
        </button>
      </div>
      <!-- Recieved feedback from Aadi to change the Send Message button into a Home button instead since at this stage users have already sent a message -->
    </main>
    <!-- ---------------------------------------------- -->
    <!-- !FOOTER -->
    <!-- ------------------------------------------ -->
    <footer class="footer text-white pt-5 pb-2">
      <div class="container justify-content-center text-center">
        <div class="column">
          <!-- need help -->
          <h5>Need Help?</h5>
          <p>Get in touch with us.</p>
          <!-- Contact us button -->
          <a
            href="NeedHelp.html"
            class="btn btn-outline-light text-white text-decoration-none"
          >
            <i
              class="bi bi-envelope"
              aria-label="Contact Us button"
              aria-hidden="true"
            ></i>
            Contact us
          </a>
        </div>
        <!-- divider -->
        <hr class="mb-3" style="opacity: 0.2" />
        <!-- !COPYRIGHT -->
        &copy; 2026 Fix It. All rights reserved.
      </div>
    </footer>
  </body>
</html>
