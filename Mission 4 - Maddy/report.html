<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>


 <div
      class="container d-flex justify-content-center align-items-center min-vh-100"
    >
      <div class="">
        <h3 class="text-center mb-4">Make a Report</h3>

        <form>
          
          <div class="mb-3">
            <!-- !checkbox input for issueType -->
            <label class="form-label text-center">Please select one or more issue type</label>
            <div class="form-check">
              <input
                class="form-check-input"
                type="checkbox"
                name="issueType"
                id="Graffiti"
                value="graffiti"
              />
              <label class="form-check-label" for="Graffiti">Graffiti</label>
            </div>

            <div class="form-check">
              <input
                type="checkbox"
                class="form-check-input"
                name="issueType"
                id="illegalDumping"
                value="illegalDumping"
              />
              <label for="illegalDumping" class="form-check-label"
                >Illegal Dumping</label
              >
            </div>

            <div class="form-check">
              <input
                class="form-check-input"
                type="checkbox"
                name="issueType"
                id="brokenStreetlight"
                value="brokenStreetlight"
              />
              <label class="form-check-label" for="brokenStreetlight"
                >Broken streetlight</label
              >
            </div>

            <div class="form-check">
              <input
                class="form-check-input"
                type="checkbox"
                name="issueType"
                id="potholes"
                value="brokenStreetlight"
              />
              <label class="form-check-label" for="potholes"
                >Potholes</label
              >
            </div>

                        <div class="form-check">
              <input
                class="form-check-input"
                type="checkbox"
                name="issueType"
                id="dogs"
                value="dogs"
              />
              <label class="form-check-label" for="dogs"
                >Dogs</label
              >
            </div>

                                    <div class="form-check">
              <input
                class="form-check-input"
                type="checkbox"
                name="issueType"
                id="complainNoise"
                value="complainNoise"
              />
              <label class="form-check-label" for="complainNoise"
                >Complain about noise</label
              >
            </div>

                        <div class="form-check">
              <input
                class="form-check-input"
                type="checkbox"
                name="issueType"
                id="flooding"
                value="flooding"
              />
              <label class="form-check-label" for="flooding"
                >Flooding</label
              >
            </div>

                        <div class="form-check">
              <input
                class="form-check-input"
                type="checkbox"
                name="issueType"
                id="abandonedVehicle"
                value="abandonedVehicle"
              />
              <label class="form-check-label" for="abandonedVehicle"
                >Abandoned vehicle</label
              >
            </div>

          </div>

          <!-- ! no need for invalid feedback just yet, but will need to code later down the line -->
          <!-- <div class="invalid-feedback">Please select an issue type.</div> -->

          <!-- !Continue button for form -->
                     <a href="report-location.html" class="btn btn-primary  mt-3">Continue</a>

        </form>


      </div>
    </div>







    
</body>
</html>
