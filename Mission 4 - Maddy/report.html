<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

 <div
      class="container d-flex justify-content-center align-items-center min-vh-100"
    >
      <div class="card shadow p-4 w-100" style="max-width: 500px">
        <!-- could use style
         .mw-500 {
         max-width: 500px;
         }
         /style -->
        <h3 class="text-center mb-4">Make a Report</h3>

        <form class="needs-validation" novalidate id="makeReport">
          
          <div class="mb-3">
            <!-- !radio input for issueType -->
            <label class="form-label">Issue/s Type</label>
            <div class="form-check">
              <input
                class="form-check-input"
                type="checkbox"
                name="issueType"
                id="Graffiti"
                value="graffiti"
              />
              <label class="form-check-label" for="Graffiti">Graffiti</label>
            </div>

            <div class="form-check">
              <input
                type="checkbox"
                class="form-check-input"
                name="issueType"
                id="illegalDumping"
                value="illegalDumping"
              />
              <label for="illegalDumping" class="form-check-label"
                >Illegal Dumping</label
              >
            </div>

            <div class="form-check">
              <input
                class="form-check-input"
                type="checkbox"
                name="issueType"
                id="brokenStreetlight"
                value="brokenStreetlight"
              />
              <label class="form-check-label" for="brokenStreetlight"
                >Broken streetlight</label
              >
            </div>

            <div class="form-check">
              <input
                class="form-check-input"
                type="checkbox"
                name="issueType"
                id="potholes"
                value="brokenStreetlight"
              />
              <label class="form-check-label" for="potholes"
                >Potholes</label
              >
            </div>

                        <div class="form-check">
              <input
                class="form-check-input"
                type="checkbox"
                name="issueType"
                id="dogs"
                value="dogs"
              />
              <label class="form-check-label" for="dogs"
                >Dogs</label
              >
            </div>

                                    <div class="form-check">
              <input
                class="form-check-input"
                type="checkbox"
                name="issueType"
                id="complainNoise"
                value="complainNoise"
              />
              <label class="form-check-label" for="complainNoise"
                >Complain about noise</label
              >
            </div>

                        <div class="form-check">
              <input
                class="form-check-input"
                type="checkbox"
                name="issueType"
                id="flooding"
                value="flooding"
              />
              <label class="form-check-label" for="flooding"
                >Flooding</label
              >
            </div>

                        <div class="form-check">
              <input
                class="form-check-input"
                type="checkbox"
                name="issueType"
                id="abandonedVehicle"
                value="abandonedVehicle"
              />
              <label class="form-check-label" for="abandonedVehicle"
                >Abandoned vehicle</label
              >
            </div>

          </div>

          <!-- ! no need for invalid feedback just yet, but will need to code later down the line -->
          <!-- <div class="invalid-feedback">Please select an issue type.</div> -->


<div class="mb-3">
    <button id="Find-me">Show my location</button>
    <p id="location"></p>
    <iframe
      id="map"
      src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d9343.80396806113!2d174.77039956534725!3d-36.848335930718676!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e1!3m2!1sen!2snz!4v1767826261837!5m2!1sen!2snz"
      width="450"
      height="450"
      style="border: 0"
      allowfullscreen=""
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade"
    ></iframe>
    </div>

          <div class="mb-3 form-check">
            <!-- !checkbox input for terms -->
            <input
              type="checkbox"
              class="form-check-input"
              id="terms"
              required
            />
            <label class="form-check-label" for="terms"
              >I agree to the terms and conditions</label
            >
            <div class="invalid-feedback">
              You must agree before submitting.
            </div>
          </div>

          <!-- !Submit button for form -->
          <button type="submit" class="btn btn-primary w-100">Submit</button>
        </form>

        <div class="mt-3 text-center">
          <small class="text-muted"
            >Already have an account?
            <a href="#" data-bs-toggle="modal" data-bs-target="#myModal"
              >Login here!</a
            ></small
          >
        </div>
      </div>
    </div>

    <!-- !LOGIN Modal -->
    <div class="modal" id="myModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <!-- Modal header -->
          <div class="modal-header">
            <h5 class="modal-title">Login</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>

          <!-- Modal Body (Login Form) -->
          <div class="modal-body">
            <form class="needs-validation" novalidate>
              <div class="mb-3">
                <label for="loginEmail" class="form-label"
                  >Email Address:
                </label>
                <input
                  type="email"
                  class="form-control"
                  id="loginEmail"
                  placeholder="name@example.com"
                  required
                />
                <div class="invalid-feedback">
                  Please enter a valid email address.
                </div>
              </div>

              <div class="mb-3">
                <label for="loginPassword" class="form-label">Password: </label>
                <input
                  type="password"
                  class="form-control"
                  id="loginPassword"
                  placeholder="password"
                  required
                />
                <div class="invalid-feedback">Please enter your password</div>
              </div>

              <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
          </div>

          <!-- Modal Footer -->
          <div class="modal-footer justify-content-between">
            <small class="text-muted">
              Don't have an account? <a href="signup.html">Sign Up</a>
            </small>
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Close
            </button>
          </div>
        </div>
      </div>
    </div>

        </div>
        </div>

    
</body>
</html>
