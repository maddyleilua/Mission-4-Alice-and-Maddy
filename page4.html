<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Illegal Rubbish Dumping</title>
    <link rel="stylesheet" href="page4.css" />
  </head>
  <body>
    <div class="card">
      <nav>
        <div class="menu-icon"><span></span><span></span><span></span></div>
        <div class="nav-right">
          <div class="avatar">AZ</div>
          <svg
            width="22"
            height="22"
            fill="none"
            viewBox="0 0 24 24"
            stroke="#3a5bc7"
            stroke-width="2.2"
          >
            <circle cx="11" cy="11" r="7" />
            <line x1="16.5" y1="16.5" x2="22" y2="22" />
          </svg>
        </div>
      </nav>

      <main>
        <h1>Illegal rubbish dumping</h1>
        <p class="subtitle">
          Please provide accurate information so our team can find the issue.
        </p>

        <label for="location">Where is the issue located?*</label>
        <input type="text" id="location" placeholder="Address,street,suburb" />

        <label for="description">Please describe the issue*</label>
        <textarea
          id="description"
          placeholder="Please  provide details such as size or nearby landmarks."
        ></textarea>

        <label class="upload-label">Please upload photo*</label>
        <p class="upload-hint">
          The system shall support uploading photos in multiple formats
          (including JPG, PNG, and HEIC)
        </p>

        <button
          class="btn-add"
          onclick="document.getElementById('photo-input').click()"
        >
          Add photo
        </button>
        <input
          type="file"
          id="photo-input"
          accept="image/*"
          style="display: none"
          onchange="handlePhoto(this)"
        />
        <p class="photo-name" id="photo-name"></p>

        <button class="btn-submit" onclick="handleSubmit()">Submit</button>
      </main>

      <footer>
        <h2>Need Help?</h2>
        <p>Get in touch with us</p>
        <a class="contact" href="#">
          <svg
            width="14"
            height="14"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="3" y="5" width="18" height="14" rx="2" />
            <polyline points="3,5 12,13 21,5" />
          </svg>
          Contact us
        </a>
      </footer>
    </div>

    <script>
      function handlePhoto(input) {
        if (input.files && input.files[0]) {
          document.getElementById("photo-name").textContent =
            "✓ " + input.files[0].name;
        }
      }

      function handleSubmit() {
        const location = document.getElementById("location").value.trim();
        const description = document.getElementById("description").value.trim();
        const photo = document.getElementById("photo-input").files[0];

        if (!location || !description) {
          alert("Please fill in all required fields.");
          return;
        }

        if (!photo) {
          window.location.href = "page5.html";
          return;
        }

        alert("Submitted successfully!");
      }
    </script>
  </body>
</html>
