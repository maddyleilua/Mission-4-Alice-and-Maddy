<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Select Issue Type</title>
    <link rel="stylesheet" href="page3.css" />
  </head>
  <body>
    <div class="card">
      <nav>
        <div class="menu-icon"><span></span><span></span><span></span></div>
        <div class="nav-right">
          <div class="avatar">AZ</div>
          <svg
            width="22"
            height="22"
            fill="none"
            viewBox="0 0 24 24"
            stroke="#3a5bc7"
            stroke-width="2.2"
          >
            <circle cx="11" cy="11" r="7" />
            <line x1="16.5" y1="16.5" x2="22" y2="22" />
          </svg>
        </div>
      </nav>

      <main>
        <h1>Please select issue type</h1>

        <div class="issue-list">
          <button class="issue-btn selected" onclick="selectIssue(this)">
            Illegal rubbish dumping
          </button>
          <button class="issue-btn" onclick="selectIssue(this)">
            Broken streetlights
          </button>
          <button class="issue-btn" onclick="selectIssue(this)">
            Damaged playground equipment
          </button>
          <button class="issue-btn" onclick="selectIssue(this)">
            Potholes
          </button>
          <button class="issue-btn" onclick="selectIssue(this)">
            Graffiti
          </button>
          <button class="issue-btn" onclick="selectIssue(this)">
            Other issues
          </button>
          <button class="issue-btn" onclick="selectIssue(this)">
            Check status
          </button>
          <button class="issue-btn" onclick="selectIssue(this)">
            Other issues
          </button>
        </div>

        <button class="btn-continue" onclick="location.href = 'page4.html'">
          Continue
        </button>
      </main>

      <footer>
        <h2>Need Help?</h2>
        <p>Get in touch with us</p>
        <a class="contact" href="#">
          <svg
            width="14"
            height="14"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="3" y="5" width="18" height="14" rx="2" />
            <polyline points="3,5 12,13 21,5" />
          </svg>
          Contact us
        </a>
      </footer>
    </div>

    <script>
      function selectIssue(btn) {
        document
          .querySelectorAll(".issue-btn")
          .forEach((b) => b.classList.remove("selected"));
        btn.classList.add("selected");
      }
    </script>
  </body>
</html>
