<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Report An Issue</title>
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <div class="card">
      <nav>
        <div class="menu-icon"><span></span><span></span><span></span></div>
        <div class="search">
          <input type="text" placeholder="Search..." />
          <svg
            width="15"
            height="15"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2.2"
          >
            <circle cx="11" cy="11" r="7" />
            <line x1="16.5" y1="16.5" x2="22" y2="22" />
          </svg>
        </div>
      </nav>

      <main>
        <h1>Report An Issue</h1>

        <!-- <svg
            width="14"
            height="14"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2.2"
          >
            <path
              stroke-linecap="round"
              d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M14 12H3"
            />
          </svg> -->

        <button class="btn" onclick="location.href = 'page1.html'">
          Log in to my account
        </button>

        <label for="email">Email <span class="required">*</span></label>
        <input type="email" id="email" placeholder="you@address.co.nz" />

        <label class="remember"> <input type="checkbox" /> Remember me </label>

        <button class="btn btn-next">Next</button>

        <div class="signup">
          <p>Don't have an account ?</p>
          <a href="#">
            <span class="avatar">
              <svg
                width="11"
                height="11"
                fill="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  d="M12 12a5 5 0 100-10 5 5 0 000 10zm0 2c-5.33 0-8 2.67-8 4v1h16v-1c0-1.33-2.67-4-8-4z"
                />
              </svg>
            </span>
            Create new account
          </a>
        </div>
      </main>

      <footer>
        <h2>Need Help?</h2>
        <p>Get in touch with us</p>
        <a class="contact" href="#">
          <svg
            width="14"
            height="14"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="3" y="5" width="18" height="14" rx="2" />
            <polyline points="3,5 12,13 21,5" />
          </svg>
          Contact us
        </a>
      </footer>
    </div>
  </body>
</html>
