<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>
    <link rel="stylesheet" href="common.css" />
    <link rel="stylesheet" href="home.css" />
  </head>
  <body>
    <!-- 跳过导航链接 for keyboard users ,use Tab to skip-->
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <div class="card">
      <nav class="nav" role="navigation" aria-label="Main navigation">
        <a href="#" aria-current="page">HOME</a>
        <a href="#" onclick="checkIssuesAccess(event)">ISSUES</a>
        <a href="#">ABOUT US</a>
        <button
          type="button"
          class="search-icon-btn"
          onclick="toggleSearchBox(event)"
          aria-label="Toggle search box"
          aria-expanded="false"
          aria-controls="nav-search-popup"
        >
          <!-- search icon can be read by screen readers -->
          <svg
            width="20"
            height="20"
            fill="none"
            viewBox="0 0 24 24"
            stroke="#3a5bc7"
            stroke-width="2.2"
            aria-hidden="true"
          >
            <circle cx="11" cy="11" r="7" />
            <line x1="16.5" y1="16.5" x2="22" y2="22" />
          </svg>
        </button>
        <div id="nav-search-popup" class="nav-search-popup" role="search">
          <label for="nav-search-input" class="sr-only">Search</label>
          <input
            id="nav-search-input"
            type="text"
            placeholder="Search..."
            aria-label="Search issues"
            onkeydown="handleSearchKey(event)"
          />
        </div>
      </nav>

      <div class="hero" id="main-content">
        <h1>Make your city better</h1>
        <button
          type="button"
          class="btn"
          onclick="location.href = 'login.html'"
          aria-label="Report an issue - starts reporting process"
        >
          Report an issue
        </button>
        <button
          type="button"
          class="btn"
          onclick="location.href = 'Maddy code/trackReport.html'"
          aria-label="Check the status of your issue report"
        >
          Check status
        </button>
        <button
          type="button"
          class="btn"
          onclick="location.href = 'page1.html'"
          aria-label="Sign in to your account"
        >
          Login
        </button>
      </div>

      <footer>
        <h2>Need Help?</h2>
        <p>Get in touch with us</p>
        <a class="contact" href="#" aria-label="Contact us via email">
          <svg
            width="14"
            height="14"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
            aria-hidden="true"
          >
            <rect x="3" y="5" width="18" height="14" rx="2" />
            <polyline points="3,5 12,13 21,5" />
          </svg>
          Contact us
        </a>
      </footer>
    </div>

    <div
      id="login-modal"
      class="login-modal-overlay"
      onclick="closeLoginModal(event)"
      role="dialog"
      aria-modal="true"
      aria-labelledby="login-modal-title"
      aria-hidden="true"
    >
      <div class="login-modal">
        <h3 id="login-modal-title">Please log in first</h3>
        <p>You need to sign in before viewing Issues.</p>
        <div class="login-modal-actions">
          <button
            type="button"
            class="btn-modal btn-cancel"
            onclick="hideLoginModal()"
            aria-label="Cancel login dialog"
          >
            Cancel
          </button>
          <button
            type="button"
            class="btn-modal btn-login"
            onclick="location.href = 'page1.html'"
            aria-label="Proceed to login page"
          >
            Go to Login
          </button>
        </div>
      </div>
    </div>

    <script src="common.js"></script>
    <script>
      function checkIssuesAccess(event) {
        event.preventDefault();
        const isSignedIn = Common.isSignedIn();

        if (isSignedIn) {
          window.location.href = "page3.html";
          return;
        }

        const modal = document.getElementById("login-modal");
        modal.classList.add("show");
        modal.setAttribute("aria-hidden", "false");
      }

      function hideLoginModal() {
        const modal = document.getElementById("login-modal");
        modal.classList.remove("show");
        modal.setAttribute("aria-hidden", "true");
      }

      function closeLoginModal(event) {
        if (event.target.id === "login-modal") {
          hideLoginModal();
        }
      }

      function toggleSearchBox(event) {
        event.stopPropagation();
        const wrapper = document.getElementById("nav-search-popup");
        const button = event.currentTarget;
        const input = document.getElementById("nav-search-input");
        const isOpen = wrapper.classList.contains("open");

        if (!isOpen) {
          wrapper.classList.add("open");
          button.setAttribute("aria-expanded", "true");
          input.focus();
          return;
        }

        wrapper.classList.remove("open");
        button.setAttribute("aria-expanded", "false");
        goFromSearch();
      }

      function handleSearchKey(event) {
        if (event.key === "Enter") {
          goFromSearch();
        }
      }

      function goFromSearch() {
        const wrapper = document.getElementById("nav-search-popup");
        const button = document.querySelector(".search-icon-btn");
        const input = document.getElementById("nav-search-input");
        const query = input.value.trim().toLowerCase();

        if (!query) {
          return;
        }

        const match = Common.findRoute(query, "home");

        if (!match) {
          alert("No matching page found.");
          return;
        }

        if (match.requireSignIn) {
          const isSignedIn = Common.isSignedIn();
          if (!isSignedIn) {
            wrapper.classList.remove("open");
            button.setAttribute("aria-expanded", "false");
            input.value = "";
            const modal = document.getElementById("login-modal");
            modal.classList.add("show");
            modal.setAttribute("aria-hidden", "false");
            return;
          }
        }

        wrapper.classList.remove("open");
        button.setAttribute("aria-expanded", "false");
        window.location.href = match.path;
      }

      document.addEventListener("click", function (event) {
        const wrapper = document.getElementById("nav-search-popup");
        const button = document.querySelector(".search-icon-btn");

        if (!wrapper.contains(event.target) && !button.contains(event.target)) {
          wrapper.classList.remove("open");
        }
      });
    </script>
  </body>
</html>
